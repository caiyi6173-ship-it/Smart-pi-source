services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: smartpi-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../data/qdrant:/qdrant/storage

  api:
    build:
      context: ..
    container_name: smartpi-rag-api
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "8094:8094"
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ../data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8094
